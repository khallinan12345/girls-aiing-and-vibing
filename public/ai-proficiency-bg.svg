<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg" style="opacity: 0.4;">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d946ef;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#d946ef;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </radialGradient>
    
    <pattern id="neuralNetwork" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <circle cx="50" cy="50" r="4" fill="#8b5cf6" opacity="0.6"/>
      <circle cx="150" cy="50" r="4" fill="#8b5cf6" opacity="0.6"/>
      <circle cx="50" cy="150" r="4" fill="#8b5cf6" opacity="0.6"/>
      <circle cx="150" cy="150" r="4" fill="#8b5cf6" opacity="0.6"/>
      <circle cx="100" cy="100" r="5" fill="#d946ef" opacity="0.8"/>
      
      <line x1="50" y1="50" x2="100" y2="100" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
      <line x1="150" y1="50" x2="100" y2="100" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
      <line x1="50" y1="150" x2="100" y2="100" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
      <line x1="150" y1="150" x2="100" y2="100" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    </pattern>
    
    <pattern id="circuits" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 10 50 L 30 50" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
      <path d="M 30 50 L 30 30 L 70 30" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
      <path d="M 30 50 L 30 70 L 70 70" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
      <circle cx="30" cy="50" r="3" fill="#3b82f6" opacity="0.6"/>
      <circle cx="70" cy="30" r="3" fill="#3b82f6" opacity="0.6"/>
      <circle cx="70" cy="70" r="3" fill="#3b82f6" opacity="0.6"/>
    </pattern>
    
    <pattern id="dataFlow" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="2" fill="#8b5cf6" opacity="0.5">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="40" cy="40" r="2" fill="#d946ef" opacity="0.5">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" begin="0.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="60" cy="60" r="2" fill="#6366f1" opacity="0.5">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" begin="1s" repeatCount="indefinite"/>
      </circle>
    </pattern>
    
    <pattern id="grid" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.2"/>
    </pattern>
  </defs>
  
  <rect width="1920" height="1080" fill="#f5f3ff"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <rect width="1920" height="1080" fill="url(#neuralNetwork)"/>
  
  <g opacity="0.6">
    <rect x="960" y="0" width="960" height="540" fill="url(#circuits)"/>
    <rect x="0" y="540" width="960" height="540" fill="url(#circuits)"/>
  </g>
  
  <rect width="1920" height="1080" fill="url(#dataFlow)"/>
  
  <g opacity="0.15">
    <circle cx="200" cy="200" r="150" fill="none" stroke="url(#grad1)" stroke-width="2"/>
    <circle cx="1720" cy="880" r="180" fill="none" stroke="url(#grad1)" stroke-width="2"/>
    <circle cx="1600" cy="150" r="80" fill="url(#glow)"/>
    <circle cx="1600" cy="150" r="80" fill="none" stroke="url(#grad2)" stroke-width="1.5"/>
    <circle cx="320" cy="880" r="100" fill="url(#glow)"/>
    <circle cx="320" cy="880" r="100" fill="none" stroke="url(#grad2)" stroke-width="1.5"/>
    <polygon points="960,100 1040,150 1040,250 960,300 880,250 880,150" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <polygon points="500,700 560,735 560,805 500,840 440,805 440,735" fill="none" stroke="#d946ef" stroke-width="1.5"/>
    <rect x="1400" y="500" width="120" height="120" rx="10" fill="none" stroke="#6366f1" stroke-width="2"/>
    <rect x="100" y="450" width="90" height="90" rx="8" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  
  <g opacity="0.25">
    <circle cx="400" cy="300" r="3" fill="#8b5cf6">
      <animate attributeName="cy" values="300;280;300" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1200" cy="600" r="2.5" fill="#d946ef">
      <animate attributeName="cy" values="600;580;600" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="200" r="2" fill="#6366f1">
      <animate attributeName="cy" values="200;185;200" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <g opacity="0.12">
    <ellipse cx="960" cy="540" rx="500" ry="350" fill="url(#glow)">
      <animate attributeName="opacity" values="0.12;0.22;0.12" dur="8s" repeatCount="indefinite"/>
    </ellipse>
  </g>
</svg>
