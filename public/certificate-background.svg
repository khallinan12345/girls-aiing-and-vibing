<svg width="850" height="1100" viewBox="0 0 850 1100" xmlns="http://www.w3.org/2000/svg" style="opacity: 0.95;">
  <defs>
    <!-- Blue gradient background -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    
    <!-- Golden gradient for accents -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    
    <!-- Radial glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0" />
    </radialGradient>
    
    <!-- Star pattern -->
    <pattern id="stars" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="20" r="1.5" fill="#ffffff" opacity="0.8">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="45" cy="55" r="1" fill="#ffffff" opacity="0.6">
        <animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="78" cy="15" r="1.2" fill="#ffffff" opacity="0.7">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="3.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="30" cy="85" r="0.8" fill="#ffffff" opacity="0.5">
        <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="65" cy="40" r="1" fill="#fbbf24" opacity="0.4">
        <animate attributeName="opacity" values="0.2;0.6;0.2" dur="5s" repeatCount="indefinite"/>
      </circle>
    </pattern>
    
    <!-- Sparkle pattern -->
    <pattern id="sparkles" x="0" y="0" width="150" height="150" patternUnits="userSpaceOnUse">
      <!-- Star shapes -->
      <polygon points="50,40 52,46 58,46 53,50 55,56 50,52 45,56 47,50 42,46 48,46" 
               fill="#fbbf24" opacity="0.6">
        <animate attributeName="opacity" values="0;0.8;0" dur="2s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="100,90 102,96 108,96 103,100 105,106 100,102 95,106 97,100 92,96 98,96" 
               fill="#ffffff" opacity="0.5">
        <animate attributeName="opacity" values="0;0.6;0" dur="3s" begin="0.5s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="20,110 22,116 28,116 23,120 25,126 20,122 15,126 17,120 12,116 18,116" 
               fill="#fbbf24" opacity="0.4">
        <animate attributeName="opacity" values="0;0.7;0" dur="2.5s" begin="1s" repeatCount="indefinite"/>
      </polygon>
    </pattern>
    
    <!-- Border gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Main blue background -->
  <rect width="850" height="1100" fill="url(#blueGrad)"/>
  
  <!-- Star field overlay -->
  <rect width="850" height="1100" fill="url(#stars)"/>
  
  <!-- Sparkles overlay -->
  <rect width="850" height="1100" fill="url(#sparkles)"/>
  
  <!-- Central glow effect -->
  <ellipse cx="425" cy="550" rx="400" ry="500" fill="url(#glow)" opacity="0.5"/>
  
  <!-- Decorative corners - top left -->
  <g opacity="0.6">
    <polygon points="0,0 150,0 0,150" fill="url(#goldGrad)" opacity="0.2"/>
    <line x1="0" y1="100" x2="100" y2="0" stroke="url(#goldGrad)" stroke-width="2"/>
    <circle cx="50" cy="50" r="3" fill="#fbbf24">
      <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Decorative corners - top right -->
  <g opacity="0.6">
    <polygon points="850,0 700,0 850,150" fill="url(#goldGrad)" opacity="0.2"/>
    <line x1="850" y1="100" x2="750" y2="0" stroke="url(#goldGrad)" stroke-width="2"/>
    <circle cx="800" cy="50" r="3" fill="#fbbf24">
      <animate attributeName="r" values="3;5;3" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Decorative corners - bottom left -->
  <g opacity="0.6">
    <polygon points="0,1100 150,1100 0,950" fill="url(#goldGrad)" opacity="0.2"/>
    <line x1="0" y1="1000" x2="100" y2="1100" stroke="url(#goldGrad)" stroke-width="2"/>
    <circle cx="50" cy="1050" r="3" fill="#fbbf24">
      <animate attributeName="r" values="3;5;3" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Decorative corners - bottom right -->
  <g opacity="0.6">
    <polygon points="850,1100 700,1100 850,950" fill="url(#goldGrad)" opacity="0.2"/>
    <line x1="850" y1="1000" x2="750" y2="1100" stroke="url(#goldGrad)" stroke-width="2"/>
    <circle cx="800" cy="1050" r="3" fill="#fbbf24">
      <animate attributeName="r" values="3;5;3" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Elegant border frame -->
  <rect x="30" y="30" width="790" height="1040" 
        fill="none" 
        stroke="url(#borderGrad)" 
        stroke-width="3" 
        rx="5"/>
  
  <!-- Inner border -->
  <rect x="50" y="50" width="750" height="1000" 
        fill="none" 
        stroke="#fbbf24" 
        stroke-width="1" 
        stroke-dasharray="5,5"
        opacity="0.4"
        rx="3"/>
  
  <!-- Top accent line -->
  <line x1="150" y1="230" x2="700" y2="230" 
        stroke="url(#goldGrad)" 
        stroke-width="2" 
        opacity="0.6"/>
  
  <!-- Bottom accent line -->
  <line x1="150" y1="950" x2="700" y2="950" 
        stroke="url(#goldGrad)" 
        stroke-width="2" 
        opacity="0.6"/>
  
  <!-- Decorative elements - top center -->
  <g transform="translate(425, 100)" opacity="0.7">
    <!-- Award ribbon shape -->
    <polygon points="0,-20 -15,-5 -15,5 0,20 15,5 15,-5" 
             fill="url(#goldGrad)" 
             opacity="0.3"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#fbbf24" stroke-width="2"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#fbbf24" stroke-width="1"/>
    <polygon points="0,-8 2,-2 8,-2 3,2 5,8 0,4 -5,8 -3,2 -8,-2 -2,-2" 
             fill="#fbbf24">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 0 0"
        to="360 0 0"
        dur="20s"
        repeatCount="indefinite"/>
    </polygon>
  </g>
  
  <!-- Decorative elements - bottom center -->
  <g transform="translate(425, 1000)" opacity="0.7">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#fbbf24" stroke-width="2"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#fbbf24" stroke-width="1"/>
    <polygon points="0,-8 2,-2 8,-2 3,2 5,8 0,4 -5,8 -3,2 -8,-2 -2,-2" 
             fill="#fbbf24">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 0 0"
        to="360 0 0"
        dur="20s"
        repeatCount="indefinite"/>
    </polygon>
  </g>
  
  <!-- Branding at top -->
  <text x="425" y="170" 
        font-family="Arial, sans-serif" 
        font-size="32" 
        font-weight="bold"
        fill="#fbbf24" 
        text-anchor="middle"
        opacity="0.9">
    Davidson Future AI Lab
  </text>
  
  <!-- Tagline -->
  <text x="425" y="205" 
        font-family="Arial, sans-serif" 
        font-size="14" 
        font-style="italic"
        fill="#ffffff" 
        text-anchor="middle"
        opacity="0.8">
    ...bringing opportunity through AI one village and one person at a time.
  </text>
  
  <!-- Floating light particles -->
  <g opacity="0.4">
    <circle cx="200" cy="300" r="2" fill="#fbbf24">
      <animate attributeName="cy" values="300;250;300" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="400" r="2" fill="#ffffff">
      <animate attributeName="cy" values="400;350;400" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="600" r="2" fill="#fbbf24">
      <animate attributeName="cy" values="600;550;600" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="700" r="2" fill="#ffffff">
      <animate attributeName="cy" values="700;650;700" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="850" r="2" fill="#fbbf24">
      <animate attributeName="cy" values="850;800;850" dur="6.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="6.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Additional scattered stars for richness -->
  <g opacity="0.6">
    <circle cx="120" cy="250" r="1" fill="#ffffff"/>
    <circle cx="730" cy="320" r="1.5" fill="#fbbf24"/>
    <circle cx="180" cy="480" r="1" fill="#ffffff"/>
    <circle cx="680" cy="580" r="1.2" fill="#fbbf24"/>
    <circle cx="250" cy="720" r="1" fill="#ffffff"/>
    <circle cx="600" cy="820" r="1.5" fill="#fbbf24"/>
    <circle cx="400" cy="380" r="1" fill="#ffffff"/>
    <circle cx="450" cy="780" r="1.2" fill="#fbbf24"/>
  </g>
</svg>
